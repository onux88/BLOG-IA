<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descarga Segura | Domina la IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] },
                    colors: { dark: '#05070a', card: '#111827', neon: '#00e5ff', purple: '#9d4edd', accent: '#ff2a5f' },
                    backgroundImage: {
                        'hero-glow': 'radial-gradient(circle at 50% -20%, rgba(157, 78, 221, 0.4), rgba(5, 7, 10, 1) 60%)',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #05070a; color: #f3f4f6; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center bg-hero-glow p-4">

    <div class="glass max-w-lg w-full rounded-3xl p-8 md:p-12 text-center shadow-[0_0_50px_rgba(157,78,221,0.2)]">
        
        <div id="loading-state" class="block">
            <i class="fa-solid fa-circle-notch fa-spin text-5xl text-neon mb-6"></i>
            <h2 class="text-2xl font-heading font-bold mb-2">Validando Acceso...</h2>
            <p class="text-gray-400 text-sm">Estamos verificando tu token de seguridad.</p>
        </div>

        <div id="success-state" class="hidden">
            <div class="w-20 h-20 bg-green-500/20 text-green-400 rounded-full flex items-center justify-center text-4xl mx-auto mb-6 border border-green-500/50">
                <i class="fa-solid fa-check"></i>
            </div>
            <h2 class="text-3xl font-heading font-bold text-white mb-4">¡Acceso Concedido!</h2>
            <p class="text-gray-300 mb-8">Tu manual está listo. Haz clic en el botón inferior para descargarlo ahora. Recuerda que este enlace <span class="text-accent font-bold">solo funciona una vez</span>.</p>
            
            <button id="btn-download" class="w-full px-8 py-4 bg-gradient-to-r from-neon to-purple text-white font-heading font-bold text-xl rounded-xl shadow-lg hover:scale-105 transition-transform duration-300 flex justify-center items-center gap-3">
                <i class="fa-solid fa-cloud-arrow-down"></i> Descargar PDF
            </button>
        </div>

        <div id="error-state" class="hidden">
            <div class="w-20 h-20 bg-red-500/20 text-accent rounded-full flex items-center justify-center text-4xl mx-auto mb-6 border border-red-500/50">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            <h2 class="text-2xl font-heading font-bold text-white mb-4">Enlace Inválido</h2>
            <p id="error-message" class="text-gray-400 mb-8">El enlace ha caducado o ya ha sido utilizado.</p>
            <a href="index.html" class="inline-block px-8 py-3 bg-gray-800 hover:bg-gray-700 text-white font-semibold rounded-lg transition-colors border border-gray-600">
                Volver al Inicio
            </a>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            const loadingState = document.getElementById('loading-state');
            const successState = document.getElementById('success-state');
            const errorState = document.getElementById('error-state');
            const btnDownload = document.getElementById('btn-download');

            if (!token) {
                loadingState.classList.add('hidden');
                errorState.classList.remove('hidden');
                document.getElementById('error-message').innerText = "No se proporcionó ningún token de descarga.";
                return;
            }

            // Simulamos verificación rápida de presencia de token (la verdadera es en el backend al descargar)
            loadingState.classList.add('hidden');
            successState.classList.remove('hidden');

            btnDownload.addEventListener('click', () => {
                // Iniciar descarga re-dirigiendo al endpoint backend
                // Esto descargará el archivo si el token es válido o mostrará el error HTML del backend si es inválido.
                window.location.href = `/api/descargar?token=${token}`;
                
                // Muestra estado de link consumido después de dar click
                setTimeout(() => {
                    successState.classList.add('hidden');
                    errorState.classList.remove('hidden');
                    document.getElementById('error-message').innerText = "Tu descarga ha comenzado. Por seguridad, este enlace ya no es válido para futuras descargas. Revisa tu carpeta de Descargas.";
                }, 3000);
            });
        });
    </script>
</body>
</html>
